<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Phase Dual preview</title>
  <desc id="desc">A linked sliding puzzle with two grids, colored pieces, targets, walls, and a central rule transformer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.48" stop-color="#101827"/>
      <stop offset="1" stop-color="#132719"/>
