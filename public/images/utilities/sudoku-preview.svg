<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Sudoku preview</title>
  <desc id="desc">A polished Sudoku board with selected cells, candidate notes, a timer, level card, and leaderboard panel.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.5" stop-color="#101827"/>
      <stop offset="1" stop-color="#10221d"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111c2d"/>
      <stop offset="1" stop-color="#09111e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.52" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <pattern id="microGrid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#26344a" stroke-width="1" opacity="0.45"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#microGrid)" opacity="0.36"/>
  <path d="M68 506C254 436 394 462 552 514C728 572 892 548 1128 430" fill="none" stroke="#38bdf8" stroke-width="2" stroke-opacity="0.16"/>
  <path d="M82 143C264 218 444 190 614 108C804 18 962 58 1118 150" fill="none" stroke="#22c55e" stroke-width="2" stroke-opacity="0.14"/>

  <g font-family="Segoe UI, Pretendard, Apple SD Gothic Neo, Arial, sans-serif">
    <text x="84" y="84" fill="#f8fafc" font-size="52" font-weight="800">Sudoku</text>
    <text x="86" y="124" fill="#a7b6cc" font-size="21">Logic grid · 10 levels · global leaderboard</text>
  </g>

